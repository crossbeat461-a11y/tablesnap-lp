<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo & AI Analysis</title>
    <style>
        /* 視認性重視のクリーンなデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f4f7f9;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px; /* テーブル幅に合わせて少し広げました */
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-back-header {
            display: inline-block;
            text-decoration: none;
            color: #935d8c;
            font-weight: bold;
            transition: 0.3s;
            padding: 8px 15px;
            background: #fff;
            border: 1px solid #935d8c;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .btn-back-header:hover {
            background: #935d8c;
            color: white;
        }

        .lang-select-demo {
            text-align: right;
        }

        select {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #935d8c;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .guide-box {
            background: #fff;
            border: 2px solid #935d8c11;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .guide-box h1 {
            font-size: 1.6rem;
            color: #935d8c;
            margin-top: 0;
            border-bottom: 3px solid #8cced7;
            display: inline-block;
            padding-bottom: 5px;
        }

        .guide-box p {
            font-size: 1rem;
            color: #555;
            line-height: 1.6;
        }

        .prompt-container {
            background: #2d3436 !important;
            border-left: 6px solid #8cced7;
            padding: 25px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .prompt-text {
            font-size: 1.1rem !important;
            color: #ffffff !important;
            line-height: 1.7;
            margin-bottom: 20px;
            display: block;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .copy-btn {
            background: #8cced7;
            color: #2d3436;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #935d8c;
            color: white;
            transform: translateY(-2px);
        }

        h2 {
            color: #2d3436;
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-left: 5px solid #4285f4;
            padding-left: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
            min-width: 1000px;
        }

        th {
            background: #636e72;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 12px 8px;
        }

        td {
            border-bottom: 1px solid #eee;
            padding: 10px 8px;
        }

        .num {
            text-align: right;
            font-family: 'Consolas', monospace;
            color: #2d3436;
        }

        .alert-stock {
            color: #e74c3c;
            font-weight: bold;
            background: #fff5f5;
        }

        .status {
            text-align: center;
            font-weight: bold;
            color: #935d8c;
            font-size: 11px;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f1f2f6;
        }

        .back-link {
            margin-top: 30px;
            display: block;
            text-align: center;
            color: #935d8c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <a href="https://crossbeat461-a11y.github.io/tablesnap-lp/" class="btn-back-header">← Back to Landing Page</a>
            <div class="lang-select-demo">
                <select onchange="switchDemoLang(this.value)" id="lang-select">
                    <option value="ja">日本語 (JP)</option>
                    <option value="en">English (EN)</option>
                    </select>
            </div>
        </div>

        <div class="guide-box">
            <h1 id="demo-title" data-i18n="demo-title">実務分析AI体験キット</h1>
            <p id="demo-guide" data-i18n="demo-guide">この表には「在庫不足」や「計算不整合」が隠れています。TableSnap Proでコピーし、AIにリスク抽出を依頼してください。</p>

            <div class="prompt-container">
                <span class="prompt-text" id="prompt-content" data-i18n="prompt-content">
                    添付の在庫販売データを分析してください。特に「現在庫が発注点を下回っている欠品リスク品」と「売上実績が単価×売上数と一致しない異常データ」を特定し、改善案を箇条書きで提示してください。
                </span>
                <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text" data-i18n="copy-btn-text">Copy Prompt</button>
            </div>
        </div>

        <h2 id="table-title" data-i18n="table-title">高度在庫管理シミュレーション（実績連動型）</h2>
        <div class="table-wrapper">
            <table>
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <a href="index.html" class="back-link">← Back to Product Page</a>
    </div>

    <script>
        const demoLabels = {
            ja: { 
                th: ["ID", "製品コード", "現在庫", "発注点", "売上数", "単価", "売上実績", "LT(日)", "更新日", "ステータス"], 
                status: ["在庫あり", "発注済", "要確認", "入荷待ち"] 
            },
            en: { 
                th: ["ID", "Code", "Stock", "ROP", "Sales Qty", "Price", "Actual Sales", "LT", "Date", "Status"], 
                status: ["In Stock", "Ordered", "Check", "Pending"] 
            }
        };

        function switchDemoLang(rawLang) {
            let lang = rawLang.toLowerCase().substring(0, 2);
            const labels = demoLabels[lang] || demoLabels['en'];
            
            // ヘッダー生成
            let headRow = "<tr>";
            labels.th.forEach(text => { headRow += `<th>${text}</th>`; });
            headRow += "</tr>";
            document.getElementById('table-head').innerHTML = headRow;

            // ボディ生成（GenSparkの指摘を反映した動的ロジック）
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            
            for (let i = 1; i <= 20; i++) {
                const stock = Math.floor(Math.random() * 50) + 5; // 現在庫
                const rop = 20; // 発注点(ROP)
                const salesQty = Math.floor(Math.random() * 30) + 1; // 当月売上数
                const price = 1500 + (i * 200);
                
                // 売上実績の計算（5行目と12行目だけあえて計算をズラして「異常値」を作る）
                let actualSales = price * salesQty;
                let statusSuffix = "";
                if (i === 5) {
                    actualSales = actualSales * 0.8; // 20%割引適用をシミュレート
                    statusSuffix = " (Discount)";
                }
                if (i === 12) {
                    actualSales = actualSales - 5000; // 返品対応をシミュレート
                    statusSuffix = " (Returned)";
                }

                const row = `<tr>
                    <td style="text-align:center">#${6000 + i}</td>
                    <td class="num">NP-${200 + i}-Z</td>
                    <td class="num ${stock < rop ? 'alert-stock' : ''}">${stock}</td>
                    <td class="num" style="color:#7f8c8d">${rop}</td>
                    <td class="num">${salesQty}</td>
                    <td class="num">${price.toLocaleString()}</td>
                    <td class="num" style="font-weight:bold">${actualSales.toLocaleString()}</td>
                    <td class="num">${(i % 5) + 2}</td>
                    <td style="text-align:center">2026/04/${String(i).padStart(2, '0')}</td>
                    <td class="status">${labels.status[i % 4]}${statusSuffix}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
            
            document.documentElement.lang = lang;
        }

        function copyPrompt() {
            const text = document.getElementById('prompt-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn-text');
                btn.innerText = "✓ Copied!";
                btn.style.background = "#2ecc71";
                setTimeout(() => {
                    btn.innerText = "Copy Prompt";
                    btn.style.background = "#8cced7";
                }, 2000);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            switchDemoLang('ja');
        });
    </script>
</body>
</html>
