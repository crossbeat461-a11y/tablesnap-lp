<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo & Precision Test</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* ガイドエリア */
        .guide-box { background: #fff9fe; border: 1px solid #935d8c33; border-radius: 8px; padding: 25px; margin-bottom: 30px; }
        .guide-box h1 { font-size: 1.6rem; color: #935d8c; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #935d8c; display: inline-block; }
        .guide-box p { font-size: 1rem; line-height: 1.6; color: #444; }
        
        /* プロンプトコピーエリア（視認性向上版） */
        .prompt-container { 
            background: #2d3436; /* ダーク背景で同化を防止 */
            border-left: 5px solid #8cced7; 
            padding: 20px; 
            margin: 20px 0; 
            position: relative;
            border-radius: 0 8px 8px 0;
        }
        .prompt-text { 
            font-size: 0.95rem; 
            color: #dfe6e9; /* 明るい文字色 */
            line-height: 1.6;
            margin-bottom: 15px; 
            display: block; 
            font-family: 'Consolas', monospace;
        }
        .copy-btn { 
            background: #8cced7; 
            color: #2d3436; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: bold;
            transition: 0.2s; 
        }
        .copy-btn:hover { background: #935d8c; color: white; }

        /* テーブル設定 */
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 15px; padding-left: 10px; border-left: 4px solid #4285f4; }
        .table-wrapper { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; min-width: 800px; }
        th { background: #444; color: white; font-weight: bold; text-align: center; padding: 12px 8px; }
        td { border: 1px solid #eee; padding: 10px 8px; }
        .num { text-align: right; font-family: 'Consolas', monospace; color: #2c3e50; }
        .status { text-align: center; font-weight: bold; color: #935d8c; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #fff9fe; }

        /* 言語選択 */
        .lang-select-demo { text-align: right; margin-bottom: 15px; }
        .lang-select-wrapper { position: relative; display: inline-block; }
        .lang-select-wrapper select { 
            padding: 6px 12px 6px 32px; font-size: 0.85rem; border-radius: 20px; 
            border: 1px solid rgba(0,0,0,0.15); cursor: pointer; 
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            appearance: auto; outline: none; transition: all 0.2s; color: #333;
        }
        .lang-select-wrapper select:hover { box-shadow: 0 4px 10px rgba(147,93,140,0.15); border-color: #935d8c; color: #935d8c; }
        .lang-select-wrapper svg {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; fill: #935d8c; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-select-demo">
        <div class="lang-select-wrapper">
            <svg viewBox="0 0 24 24" class="globe-icon"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c1.39-2.39 3.86-4 6.92-4v.04zm4.06 6H7.91c-.08-.66-.14-1.32-.14-2s.06-1.34.14-2h7.82c.08.66.14 1.32.14 2s-.06 1.34-.14 2zm-1.91 3.96c-.43 1.43-1.08 2.76-1.91 3.96-.83-1.2-1.48-2.53-1.91-3.96h3.82zm2.06 4c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56z"/></svg>
            <select onchange="switchDemoLang(this.value)" id="lang-select">
            <option value="ja">日本語 (JP)</option>
            <option value="en">English (EN)</option>
            <option value="zh">简体中文 (CN)</option>
            <option value="tw">繁體中文 (TW)</option>
            <option value="ko">한국어 (KR)</option>
            <option value="fr">Français (FR)</option>
            <option value="de">Deutsch (DE)</option>
            <option value="es">Español (ES)</option>
            <option value="pt">Português (PT)</option>
            <option value="it">Italiano (IT)</option>
            <option value="ru">Русский (RU)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="id">Bahasa Indonesia (ID)</option>
        </select>
        </div>
    </div>

    <div class="guide-box">
        <h1 id="demo-title" data-i18n="demo-title">AI分析体験キット</h1>
        <p id="demo-guide" data-i18n="demo-guide">TableSnap Proで下の表をコピーし、プロンプトと一緒にAIへ渡してみてください。</p>
        
        <div class="prompt-container">
            <span class="prompt-text" id="prompt-content" data-i18n="prompt-content">以下のデータを分析して、ビジネス改善案を提案してください。</span>
            <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text" data-i18n="copy-btn-text">プロンプトをコピー</button>
        </div>
    </div>

    <h2 id="table-title" data-i18n="table-title">精密データテスト（20行）</h2>
    <div class="table-wrapper">
        <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script src="translations.js"></script>

<script>
    // デモテーブル用の多言語ラベル
    const demoLabels = {
        ja: { th: ["管理番号", "製品コード", "在庫数", "単価", "売上合計", "更新日", "ステータス", "担当部署"], status: ["完了", "待機中", "確認中", "進行中"], depts: ["第一開発部", "営業支援課", "品質管理部", "物流センター"] },
        en: { th: ["ID", "Product Code", "Stock", "Unit Price", "Total Sales", "Date", "Status", "Dept"], status: ["Done", "Pending", "Review", "Process"], depts: ["R&D", "Sales", "Quality", "Logistics"] },
        zh: { th: ["编号", "产品代码", "库存", "单价", "总销售额", "日期", "状态", "部门"], status: ["完成", "等待", "确认", "进行中"], depts: ["研发部", "销售部", "品管部", "物流部"] },
        tw: { th: ["編號", "產品代碼", "庫存", "單價", "總銷售額", "日期", "狀態", "部門"], status: ["完成", "等待", "確認", "進行中"], depts: ["研發部", "銷售部", "品管部", "物流部"] },
        ko: { th: ["관리번호", "제품코드", "재고", "단가", "총매출", "날짜", "상태", "부서"], status: ["완료", "대기", "확인", "진행중"], depts: ["개발부", "영업부", "품질부", "물류부"] },
        fr: { th: ["ID", "Code", "Stock", "Prix", "Total", "Date", "Statut", "Dépt"], status: ["Terminé", "Attente", "Revue", "En cours"], depts: ["R&D", "Ventes", "Qualité", "Logistique"] },
        de: { th: ["ID", "Code", "Bestand", "Preis", "Gesamt", "Datum", "Status", "Abt"], status: ["Fertig", "Warten", "Prüfung", "Laufend"], depts: ["F&E", "Vertrieb", "Qualität", "Logistik"] },
        es: { th: ["ID", "Código", "Stock", "Precio", "Total", "Fecha", "Estado", "Depto"], status: ["Hecho", "Espera", "Revisión", "Proceso"], depts: ["I+D", "Ventas", "Calidad", "Logística"] },
        pt: { th: ["ID", "Código", "Estoque", "Preço", "Total", "Data", "Status", "Depto"], status: ["Feito", "Espera", "Revisão", "Processo"], depts: ["P&D", "Vendas", "Qualidade", "Logística"] },
        it: { th: ["ID", "Codice", "Stock", "Prezzo", "Totale", "Data", "Stato", "Rep"], status: ["Fatto", "Attesa", "Revisione", "In corso"], depts: ["R&S", "Vendite", "Qualità", "Logistica"] },
        ru: { th: ["ID", "Код", "Запас", "Цена", "Итог", "Дата", "Статус", "Отд"], status: ["Готово", "Ожидание", "Проверка", "В работе"], depts: ["НИОКР", "Продажи", "ОТК", "Логистика"] },
        hi: { th: ["ID", "कोड", "स्टॉक", "मूल्य", "कुल", "तिथि", "स्थिति", "विभाग"], status: ["पूर्ण", "लंबित", "समीक्षा", "जारी"], depts: ["विकास", "बिक्री", "गुणवत्ता", "रसद"] },
        ar: { th: ["رقم", "كود", "مخزون", "سعر", "إجمالي", "تاريخ", "حالة", "قسم"], status: ["تم", "انتظار", "مراجعة", "جاري"], depts: ["تطوير", "مبيعات", "جودة", "لوجستيات"] },
        id: { th: ["ID", "Kode", "Stok", "Harga", "Total", "Tanggal", "Status", "Dept"], status: ["Selesai", "Tunggu", "Tinjau", "Proses"], depts: ["R&D", "Sales", "Kualitas", "Logistik"] }
    };

    function switchDemoLang(lang) {
        // translations.js が存在するかチェック
        if (typeof translations === 'undefined') {
            console.error("translations.js が読み込まれていません。");
            return;
        }

        const data = translations[lang] || translations['en'];

        // 1. translations.js の基本テキストを適用
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (data[key]) {
                el.innerHTML = data[key];
            }
        });

        // 2. テーブル（ヘッダーと中身）の生成
        const labels = demoLabels[lang] || demoLabels['en'];
        let headRow = "<tr>";
        labels.th.forEach(text => { headRow += `<th>${text}</th>`; });
        headRow += "</tr>";
        document.getElementById('table-head').innerHTML = headRow;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const price = (i === 5 || i === 14) ? 80000 : 12000 + (i * 1500);
            const qty = (i === 5 || i === 14) ? 2 : Math.floor(20 + Math.random() * 80);
            const total = price * qty;
            const row = `<tr>
                <td style="text-align:center">#${5000 + i}</td>
                <td class="num">KT-${100 + i}-X</td>
                <td class="num" ${qty < 10 ? 'style="color:#e74c3c; font-weight:bold;"' : ''}>${qty}</td>
                <td class="num">${price.toLocaleString()}</td>
                <td class="num">${total.toLocaleString()}</td>
                <td style="text-align:center">2026/03/${String(i).padStart(2, '0')}</td>
                <td class="status">${labels.status[i % 4]}</td>
                <td style="text-align:center">${labels.depts[i % 4]}</td>
            </tr>`;
            tbody.innerHTML += row;
        }

        document.getElementById('lang-select').value = lang;
        localStorage.setItem('preferredLang', lang);
        document.documentElement.lang = lang;
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-content').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn-text');
            const originalText = btn.innerText;
            btn.innerText = "✓ Copied!";
            btn.style.background = "#2ecc71";
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.background = "#8cced7";
            }, 2000);
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('preferredLang') || 'ja';
        switchDemoLang(savedLang);
    });
</script>

</body>
</html>
