<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo & Precision Test</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* ガイドエリア */
        .guide-box { background: #fff9fe; border: 1px solid #935d8c33; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .guide-box h1 { font-size: 1.4rem; color: #935d8c; margin-top: 0; }
        .guide-box p { font-size: 0.95rem; line-height: 1.6; }
        
        /* プロンプトコピーエリア（視認性を修正） */
        .prompt-container { background: #f8f9fa; border-left: 4px solid #935d8c; padding: 15px; margin: 15px 0; position: relative; }
        /* 文字色をはっきりした「濃い紫」に固定して同化を防ぐ */
        .prompt-text { font-size: 1rem; color: #935d8c !important; font-weight: bold; display: block; margin-bottom: 10px; }
        .copy-btn { background: #935d8c; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .copy-btn:hover { background: #7a4b74; }

        /* テーブル設定 */
        h2 { color: #333; font-size: 1.1rem; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; min-width: 800px; }
        th { background: #444; color: white; font-weight: bold; text-align: center; padding: 12px 8px; }
        td { border: 1px solid #eee; padding: 10px 8px; }
        .num { text-align: right; font-family: 'Consolas', monospace; color: #2c3e50; }
        .status { text-align: center; font-weight: bold; color: #935d8c; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #fff9fe; }

        /* 言語選択 */
        .lang-select-demo { text-align: right; margin-bottom: 10px; }
        select { padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-select-demo">
        <select onchange="switchDemoLang(this.value)" id="lang-select">
            <option value="ja">日本語 (JP)</option>
            <option value="en">English (EN)</option>
            <option value="zh">简体中文 (CN)</option>
            <option value="tw">繁體中文 (TW)</option>
            <option value="ko">한국어 (KR)</option>
            <option value="fr">Français (FR)</option>
            <option value="de">Deutsch (DE)</option>
            <option value="es">Español (ES)</option>
            <option value="pt">Português (PT)</option>
            <option value="it">Italiano (IT)</option>
            <option value="ru">Русский (RU)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="id">Bahasa Indonesia (ID)</option>
        </select>
    </div>

    <div class="guide-box">
        <h1 id="demo-title" data-i18n="demo-title"></h1>
        <p id="demo-guide" data-i18n="demo-guide"></p>
        
        <div class="prompt-container">
            <span class="prompt-text" id="prompt-content" data-i18n="prompt-content"></span>
            <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text" data-i18n="copy-btn-text"></button>
        </div>
    </div>

    <h2 id="table-title" data-i18n="table-title"></h2>
    <div class="table-wrapper">
        <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script src="translations.js"></script>

<script>
    const demoLabels = {
        ja: { th: ["管理番号", "製品コード", "在庫数", "単価", "売上合計", "更新日", "ステータス", "担当部署"], status: ["完了", "待機中", "確認中", "進行中"], depts: ["第一開発部", "営業支援課", "品質管理部", "物流センター"] },
        en: { th: ["ID", "Product Code", "Stock", "Unit Price", "Total Sales", "Date", "Status", "Dept"], status: ["Done", "Pending", "Review", "Process"], depts: ["R&D", "Sales", "Quality", "Logistics"] },
        zh: { th: ["编号", "产品代码", "库存", "单价", "总销售额", "日期", "状态", "部门"], status: ["完成", "等待", "确认", "进行中"], depts: ["研发部", "销售部", "品管部", "物流部"] },
        tw: { th: ["編號", "產品代碼", "庫存", "單價", "總銷售額", "日期", "狀態", "部門"], status: ["完成", "等待", "確認", "進行中"], depts: ["研發部", "銷售部", "品管部", "物流部"] },
        ko: { th: ["관리번호", "제품코드", "재고", "단가", "총매출", "날짜", "상태", "부서"], status: ["완료", "대기", "확인", "진행중"], depts: ["개발부", "영업부", "품질부", "물류부"] },
        fr: { th: ["ID", "Code", "Stock", "Prix", "Total", "Date", "Statut", "Dépt"], status: ["Terminé", "Attente", "Revue", "En cours"], depts: ["R&D", "Ventes", "Qualité", "Logistique"] },
        de: { th: ["ID", "Code", "Bestand", "Preis", "Gesamt", "Datum", "Status", "Abt"], status: ["Fertig", "Warten", "Prüfung", "Laufend"], depts: ["F&E", "Vertrieb", "Qualität", "Logistik"] },
        es: { th: ["ID", "Código", "Stock", "Precio", "Total", "Fecha", "Estado", "Depto"], status: ["Hecho", "Espera", "Revisión", "Proceso"], depts: ["I+D", "Ventas", "Calidad", "Logística"] },
        pt: { th: ["ID", "Código", "Estoque", "Preço", "Total", "Data", "Status", "Depto"], status: ["Feito", "Espera", "Revisão", "Processo"], depts: ["P&D", "Vendas", "Qualidade", "Logística"] },
        it: { th: ["ID", "Codice", "Stock", "Prezzo", "Totale", "Data", "Stato", "Rep"], status: ["Fatto", "Attesa", "Revisione", "In corso"], depts: ["R&S", "Vendite", "Qualità", "Logistica"] },
        ru: { th: ["ID", "Код", "Запас", "Цена", "Итог", "Дата", "Статус", "Отд"], status: ["Готово", "Ожидание", "Проверка", "В работе"], depts: ["НИОКР", "Продажи", "ОТК", "Логистика"] },
        hi: { th: ["ID", "कोड", "स्टॉक", "मूल्य", "कुल", "तिथि", "स्थिति", "विभाग"], status: ["पूर्ण", "लंबित", "समीक्षा", "जारी"], depts: ["विकास", "बिक्री", "गुणवत्ता", "रसद"] },
        ar: { th: ["رقم", "كود", "مخزون", "سعر", "إجمالي", "تاريخ", "حالة", "قسم"], status: ["تم", "انتظار", "مراجعة", "جاري"], depts: ["تطوير", "مبيعات", "جودة", "لوجستيات"] },
        id: { th: ["ID", "Kode", "Stok", "Harga", "Total", "Tanggal", "Status", "Dept"], status: ["Selesai", "Tunggu", "Tinjau", "Proses"], depts: ["R&D", "Sales", "Kualitas", "Logistik"] }
    };

    function switchDemoLang(lang) {
        // translations.js のデータを適用
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) {
                el.innerHTML = translations[lang][key];
            }
        });

        // テーブル生成
        const labels = demoLabels[lang] || demoLabels['en'];
        let headRow = "<tr>";
        labels.th.forEach(text => { headRow += `<th>${text}</th>`; });
        headRow += "</tr>";
        document.getElementById('table-head').innerHTML = headRow;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const price = 12000 + (i * 1500);
            const qty = 20 + i;
            const row = `<tr>
                <td style="text-align:center">#${5000 + i}</td>
                <td class="num">KT-${100 + i}-X</td>
                <td class="num">${qty}</td>
                <td class="num">${price.toLocaleString()}</td>
                <td class="num">${(price * qty).toLocaleString()}</td>
                <td style="text-align:center">2026/03/${String(i).padStart(2, '0')}</td>
                <td class="status">${labels.status[i % 4]}</td>
                <td style="text-align:center">${labels.depts[i % 4]}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        document.getElementById('lang-select').value = lang;
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-content').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied!");
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        switchDemoLang('ja');
    });
</script>
</body>
</html>
