<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo & Precision Test</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* ガイドエリア */
        .guide-box { background: #fff9fe; border: 1px solid #935d8c33; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .guide-box h1 { font-size: 1.4rem; color: #935d8c; margin-top: 0; }
        .guide-box p { font-size: 0.95rem; line-height: 1.6; }
        
        /* プロンプトコピーエリア */
        .prompt-container { background: #f8f9fa; border-left: 4px solid #935d8c; padding: 15px; margin: 15px 0; position: relative; }
        .prompt-text { font-size: 0.85rem; color: #555; font-style: italic; margin-bottom: 10px; display: block; }
        .copy-btn { background: #935d8c; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .copy-btn:hover { background: #7a4b74; }

        /* テーブル設定 */
        h2 { color: #333; font-size: 1.1rem; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; min-width: 800px; }
        th { background: #444; color: white; font-weight: bold; text-align: center; padding: 12px 8px; }
        td { border: 1px solid #eee; padding: 10px 8px; }
        .num { text-align: right; font-family: 'Consolas', monospace; color: #2c3e50; }
        .status { text-align: center; font-weight: bold; color: #935d8c; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #fff9fe; }

        /* 言語選択（デモページ単体でも動くように配置） */
        .lang-select-demo { text-align: right; margin-bottom: 10px; }
        select { padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-select-demo">
        <select onchange="switchDemoLang(this.value)" id="lang-select">
            <option value="ja">日本語 (JP)</option>
            <option value="en">English (EN)</option>
            <option value="zh">简体中文 (CN)</option>
            <option value="tw">繁體中文 (TW)</option>
            <option value="ko">한국어 (KR)</option>
            <option value="fr">Français (FR)</option>
            <option value="de">Deutsch (DE)</option>
            <option value="es">Español (ES)</option>
            <option value="pt">Português (PT)</option>
            <option value="it">Italiano (IT)</option>
            <option value="ru">Русский (RU)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="id">Bahasa Indonesia (ID)</option>
        </select>
    </div>

    <div class="guide-box">
        <h1 id="demo-title">AI Analysis Experience Kit</h1>
        <p id="demo-guide">TableSnap Proをインストールして、下の表をコピーしてください。そのあと、この魔法のプロンプトをAI（Gemini/ChatGPT）に貼り付けると、完璧な分析が始まります。</p>
        
        <div class="prompt-container">
            <span class="prompt-text" id="prompt-content">以下のデータを分析して、在庫不足のリスクがある製品と、最も売上に貢献している部署を特定してください。また、今後のビジネス改善案を3つ提案してください。</span>
            <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text">プロンプトをコピー</button>
        </div>
    </div>

    <h2 id="table-title">K-Tech Precision Test Data</h2>
    <div class="table-wrapper">
        <table>
            <thead id="table-head">
                </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script src="translations.js"></script>
<script>
    // デモページ専用の追加翻訳データ（translations.jsとは別に定義）
    const demoTranslations = {
        ja: {
            "demo-title": "AI分析体験キット",
            "demo-guide": "TableSnap Proで下の表をコピーし、プロンプトと一緒にAI（Gemini/ChatGPT）へ渡してみてください。一瞬で100点の分析結果が返ります。",
            "prompt-content": "以下のデータを分析して、在庫不足のリスクがある製品と、最も売上に貢献している部署を特定してください。また、今後のビジネス改善案を3つ提案してください。",
            "copy-btn-text": "プロンプトをコピー",
            "table-title": "精密データテスト（20行）",
            "th": ["管理番号", "製品コード", "在庫数", "単価", "売上合計", "更新日", "ステータス", "担当部署"],
            "status": ["完了", "待機中", "確認中", "進行中"],
            "depts": ["第一開発部", "営業支援課", "品質管理部", "物流センター"]
        },
        en: {
            "demo-title": "AI Analysis Experience Kit",
            "demo-guide": "Copy the table below using TableSnap Pro and paste it with this prompt into your AI (Gemini/ChatGPT). You'll get perfect analysis results instantly.",
            "prompt-content": "Analyze the following data to identify products with stock-out risks and departments contributing most to sales. Also, propose 3 business improvement plans.",
            "copy-btn-text": "Copy Prompt",
            "table-title": "Precision Test Data (20 Rows)",
            "th": ["ID", "Product Code", "Stock", "Unit Price", "Total Sales", "Date", "Status", "Dept"],
            "status": ["Completed", "Pending", "Reviewing", "In Progress"],
            "depts": ["R&D Div 1", "Sales Support", "Quality Control", "Logistics"]
        }
        // 他の言語は必要に応じて追加。まずはこの2つで仕組みを確認。
    };

    function switchDemoLang(lang) {
        const data = demoTranslations[lang] || demoTranslations['en'];
        
        // テキスト書き換え
        document.getElementById('demo-title').innerText = data["demo-title"];
        document.getElementById('demo-guide').innerText = data["demo-guide"];
        document.getElementById('prompt-content').innerText = data["prompt-content"];
        document.getElementById('copy-btn-text').innerText = data["copy-btn-text"];
        document.getElementById('table-title').innerText = data["table-title"];
        document.getElementById('lang-select').value = lang;

        // テーブルヘッダー生成
        let headRow = "<tr>";
        data.th.forEach(text => { headRow += `<th>${text}</th>`; });
        headRow += "</tr>";
        document.getElementById('table-head').innerHTML = headRow;

        // テーブルボディ生成（仕込みデータ）
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        
        // 木村さんの仕込みデータロジック
        for (let i = 1; i <= 20; i++) {
            const date = `2026/03/${String(i).padStart(2, '0')}`;
            const price = (i === 5 || i === 14) ? 80000 : 12000 + (i * 1500); // 特定の行を高単価に
            const qty = (i === 5 || i === 14) ? 2 : Math.floor(20 + Math.random() * 80); // 特定の行を在庫不足に
            const total = price * qty;

            let row = `<tr>
                <td style="text-align:center">#${5000 + i}</td>
                <td class="num">KT-${100 + i}-X</td>
                <td class="num" ${qty < 10 ? 'style="color:red; font-weight:bold;"' : ''}>${qty}</td>
                <td class="num">${price.toLocaleString()}</td>
                <td class="num">${total.toLocaleString()}</td>
                <td style="text-align:center">${date}</td>
                <td class="status">${data.status[i % 4]}</td>
                <td style="text-align:center">${data.depts[i % 4]}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        localStorage.setItem('preferredLang', lang);
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-content').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn-text');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('preferredLang') || 'ja';
        switchDemoLang(savedLang);
    });
</script>

</body>
</html>
