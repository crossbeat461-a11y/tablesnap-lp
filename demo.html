<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo Page</title>
    <style>
        /* デザインにこだわらず、視認性と正確性を優先したスタイル */
        body { font-family: sans-serif; background: #ffffff; color: #000000; padding: 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; }
        
        .lang-select-demo { text-align: right; margin-bottom: 20px; }
        select { padding: 10px; font-size: 1rem; }

        .guide-box { border: 2px solid #000; padding: 20px; margin-bottom: 20px; background: #f9f9f9; }
        
        /* プロンプトセクション：白背景に黒文字、太枠で「絶対に見える」ように設定 */
        .prompt-container { 
            background: #ffffff !important; 
            border: 3px solid #000000 !important; 
            padding: 20px; 
            margin: 20px 0; 
        }
        .prompt-text { 
            font-size: 1.1rem !important; 
            color: #000000 !important; /* 絶対に黒 */
            display: block; 
            margin-bottom: 15px;
            font-weight: bold;
        }
        .copy-btn { 
            background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;
        }

        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 0.9rem; }
        th { background: #eee; }
        .num { text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-select-demo">
        <select onchange="switchDemoLang(this.value)" id="lang-select">
            <option value="ja">日本語 (JP)</option>
            <option value="en">English (EN)</option>
            <option value="zh">简体中文 (CN)</option>
            <option value="tw">繁體中文 (TW)</option>
            <option value="ko">한국어 (KR)</option>
            <option value="fr">Français (FR)</option>
            <option value="de">Deutsch (DE)</option>
            <option value="es">Español (ES)</option>
            <option value="pt">Português (PT)</option>
            <option value="it">Italiano (IT)</option>
            <option value="ru">Русский (RU)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="id">Bahasa Indonesia (ID)</option>
        </select>
    </div>

    <div class="guide-box">
        <h1 id="demo-title" data-i18n="demo-title"></h1>
        <p id="demo-guide" data-i18n="demo-guide"></p>
        
        <div class="prompt-container">
            <span class="prompt-text" id="prompt-content" data-i18n="prompt-content"></span>
            <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text" data-i18n="copy-btn-text">Copy Prompt</button>
        </div>
    </div>

    <h2 id="table-title" data-i18n="table-title"></h2>
    <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
    </table>
    <p><a href="index.html">← Back to index</a></p>
</div>

<script src="translations.js"></script>
<script>
    const demoLabels = {
        ja: { th: ["管理番号", "製品", "在庫", "単価", "売上", "日付", "状態", "部署"], status: ["完了", "待機", "確認", "進行"], depts: ["開発", "営業", "品質", "物流"] },
        en: { th: ["ID", "Product", "Stock", "Price", "Total", "Date", "Status", "Dept"], status: ["Done", "Pending", "Review", "Process"], depts: ["R&D", "Sales", "Quality", "Logistics"] },
        zh: { th: ["编号", "产品", "库存", "单价", "销售", "日期", "状态", "部门"], status: ["完成", "等待", "确认", "进行"], depts: ["研发", "销售", "品管", "物流"] },
        tw: { th: ["編號", "產品", "庫存", "單價", "銷售", "日期", "狀態", "部門"], status: ["完成", "等待", "確認", "進行"], depts: ["研發", "銷售", "品管", "物流"] },
        ko: { th: ["관리번호", "제품", "재고", "단가", "매출", "날짜", "상태", "부서"], status: ["완료", "대기", "확인", "진행"], depts: ["개발", "영업", "품질", "물류"] },
        fr: { th: ["ID", "Produit", "Stock", "Prix", "Total", "Date", "Statut", "Dépt"], status: ["Fini", "Attente", "Revue", "Cours"], depts: ["R&D", "Ventes", "Qualité", "Logistique"] },
        de: { th: ["ID", "Produkt", "Bestand", "Preis", "Gesamt", "Datum", "Status", "Abt"], status: ["Fertig", "Warten", "Prüfung", "Laufend"], depts: ["F&E", "Vertrieb", "Qualität", "Logistik"] },
        es: { th: ["ID", "Código", "Stock", "Precio", "Total", "Fecha", "Estado", "Depto"], status: ["Hecho", "Espera", "Revisión", "Proceso"], depts: ["I+D", "Ventas", "Calidad", "Logística"] },
        pt: { th: ["ID", "Código", "Estoque", "Preço", "Total", "Data", "Status", "Depto"], status: ["Feito", "Espera", "Revisão", "Processo"], depts: ["P&D", "Vendas", "Qualidade", "Logística"] },
        it: { th: ["ID", "Codice", "Stock", "Prezzo", "Totale", "Data", "Stato", "Rep"], status: ["Fatto", "Attesa", "Revisione", "In corso"], depts: ["R&S", "Vendite", "Qualità", "Logistica"] },
        ru: { th: ["ID", "Код", "Запас", "Цена", "Итог", "Дата", "Статус", "Отд"], status: ["Готово", "Ожидание", "Проверка", "В работе"], depts: ["НИОКР", "Продажи", "ОТК", "Логистика"] },
        hi: { th: ["ID", "कोड", "स्टॉक", "मूल्य", "कुल", "तिथि", "स्थिति", "विभाग"], status: ["पूर्ण", "लंबित", "समीक्षा", "जारी"], depts: ["विकास", "बिक्री", "गुणवत्ता", "रसद"] },
        ar: { th: ["رقم", "كود", "مخزون", "سعر", "إجمالي", "تاريخ", "حالة", "قسم"], status: ["تم", "انتظار", "مراجعة", "جاري"], depts: ["تطوير", "مبيعات", "جودة", "لوجستيات"] },
        id: { th: ["ID", "Kode", "Stok", "Harga", "Total", "Tanggal", "Status", "Dept"], status: ["Selesai", "Tunggu", "Tinjau", "Proses"], depts: ["R&D", "Sales", "Kualitas", "Logistik"] }
    };

    function switchDemoLang(rawLang) {
        if (typeof translations === 'undefined') return;

        // キーの正規化 (en-US -> en, En -> en など)
        let lang = rawLang.toLowerCase().split('-')[0];
        // translations.js のキー構造に合わせる
        if (lang === 'zh' && rawLang === 'tw') lang = 'tw';

        const data = translations[lang] || translations['en'];

        // 1. テキストの一括置換 (data-i18n 属性を使用)
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (data[key]) {
                el.innerHTML = data[key];
            } else if (translations['en'][key]) {
                el.innerHTML = translations['en'][key];
            }
        });

        // 2. テーブル生成
        const labels = demoLabels[lang] || demoLabels['en'];
        let headHtml = "<tr>" + labels.th.map(t => `<th>${t}</th>`).join('') + "</tr>";
        document.getElementById('table-head').innerHTML = headHtml;

        let bodyHtml = "";
        for (let i = 1; i <= 10; i++) {
            bodyHtml += `<tr>
                <td>#${5000 + i}</td>
                <td>KT-${100 + i}</td>
                <td class="num">${20 + i}</td>
                <td class="num">${(12000 + i * 1000).toLocaleString()}</td>
                <td class="num">${((12000 + i * 1000) * (20 + i)).toLocaleString()}</td>
                <td>2026/03/15</td>
                <td>${labels.status[i % 4]}</td>
                <td>${labels.depts[i % 4]}</td>
            </tr>`;
        }
        document.getElementById('table-body').innerHTML = bodyHtml;

        document.getElementById('lang-select').value = rawLang;
        localStorage.setItem('preferredLang', rawLang);
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-content').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied!");
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('preferredLang') || 'ja';
        switchDemoLang(savedLang);
    });
</script>
</body>
</html>
