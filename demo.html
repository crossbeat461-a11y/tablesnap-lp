<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TableSnap Pro | Demo & Precision Test</title>
    <style>
        /* デザイン：視認性を最優先し、エンジニア向けのクールなトーンに */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .lang-select-demo { text-align: right; margin-bottom: 20px; }
        select { padding: 8px 15px; border-radius: 6px; border: 1px solid #935d8c; background: #fff; cursor: pointer; font-weight: bold; }

        .guide-box { background: #fff; border: 2px solid #935d8c11; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        .guide-box h1 { font-size: 1.6rem; color: #935d8c; margin-top: 0; border-bottom: 3px solid #8cced7; display: inline-block; padding-bottom: 5px; }
        .guide-box p { font-size: 1rem; color: #666; margin-bottom: 20px; }
        
        /* 【改善】プロンプトエリア：絶対に「同化」しないダークモード設定 */
        .prompt-container { 
            background: #1e272e !important; /* 真っ黒に近いグレー */
            border-left: 6px solid #8cced7; 
            padding: 25px; 
            margin: 20px 0; 
            border-radius: 0 8px 8px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .prompt-text { 
            font-size: 1.05rem; 
            color: #ffffff !important; /* 文字は絶対に白 */
            line-height: 1.7;
            margin-bottom: 20px; 
            display: block; 
            font-family: 'Consolas', 'Monaco', monospace;
            min-height: 1.5em; /* 空でも形を維持 */
        }
        .copy-btn { 
            background: #8cced7; 
            color: #1e272e; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: bold;
            transition: 0.3s; 
        }
        .copy-btn:hover { background: #935d8c; color: white; transform: translateY(-2px); }

        /* テーブル設定 */
        h2 { color: #2d3436; font-size: 1.3rem; margin-bottom: 15px; border-left: 5px solid #4285f4; padding-left: 15px; }
        .table-wrapper { overflow-x: auto; border: 1px solid #dfe6e9; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; font-size: 14px; min-width: 800px; }
        th { background: #636e72; color: white; font-weight: bold; text-align: center; padding: 15px 10px; }
        td { border-bottom: 1px solid #eee; padding: 12px 10px; }
        .num { text-align: right; font-family: 'Consolas', monospace; color: #2d3436; }
        .status { text-align: center; font-weight: bold; color: #935d8c; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f1f2f6; }
        .back-link { margin-top: 30px; display: block; text-align: center; color: #935d8c; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-select-demo">
        <select onchange="switchDemoLang(this.value)" id="lang-select">
            <option value="ja">日本語 (JP)</option>
            <option value="en">English (EN)</option>
            <option value="zh">简体中文 (CN)</option>
            <option value="tw">繁體中文 (TW)</option>
            <option value="ko">한국어 (KR)</option>
            <option value="fr">Français (FR)</option>
            <option value="de">Deutsch (DE)</option>
            <option value="es">Español (ES)</option>
            <option value="pt">Português (PT)</option>
            <option value="it">Italiano (IT)</option>
            <option value="ru">Русский (RU)</option>
            <option value="hi">हिन्दी (IN)</option>
            <option value="ar">العربية (AR)</option>
            <option value="id">Bahasa Indonesia (ID)</option>
        </select>
    </div>

    <div class="guide-box">
        <h1 id="demo-title" data-i18n="demo-title"></h1>
        <p id="demo-guide" data-i18n="demo-guide"></p>
        
        <div class="prompt-container">
            <span class="prompt-text" id="prompt-content" data-i18n="prompt-content"></span>
            <button class="copy-btn" onclick="copyPrompt()" id="copy-btn-text" data-i18n="copy-btn-text"></button>
        </div>
    </div>

    <h2 id="table-title" data-i18n="table-title"></h2>
    <div class="table-wrapper">
        <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <a href="index.html" class="back-link">← Back to Product Page</a>
</div>

<script src="translations.js"></script>
<script>
    const demoLabels = {
        ja: { th: ["管理番号", "製品コード", "在庫数", "単価", "売上合計", "更新日", "ステータス", "担当部署"], status: ["完了", "待機中", "確認中", "進行中"], depts: ["第一開発部", "営業支援課", "品質管理部", "物流センター"] },
        en: { th: ["ID", "Product Code", "Stock", "Unit Price", "Total Sales", "Date", "Status", "Dept"], status: ["Done", "Pending", "Review", "Process"], depts: ["R&D", "Sales", "Quality", "Logistics"] },
        zh: { th: ["编号", "产品代码", "库存", "单价", "总销售额", "日期", "状态", "部门"], status: ["完成", "等待", "确认", "进行中"], depts: ["研发部", "销售部", "品管部", "物流部"] },
        tw: { th: ["編號", "產品代碼", "庫存", "單價", "總銷售額", "日期", "狀態", "部門"], status: ["完成", "等待", "確認", "進行中"], depts: ["研發部", "銷售部", "品管部", "物流部"] },
        ko: { th: ["관리번호", "제품코드", "재고", "단가", "총매출", "날짜", "상태", "부서"], status: ["완료", "대기", "확인", "진행중"], depts: ["개발부", "영업부", "품질부", "물류부"] },
        fr: { th: ["ID", "Code", "Stock", "Prix", "Total", "Date", "Statut", "Dépt"], status: ["Terminé", "Attente", "Revue", "En cours"], depts: ["R&D", "Ventes", "Qualité", "Logistique"] },
        de: { th: ["ID", "Code", "Bestand", "Preis", "Gesamt", "Datum", "Status", "Abt"], status: ["Fertig", "Warten", "Prüfung", "Laufend"], depts: ["F&E", "Vertrieb", "Qualität", "Logistik"] },
        es: { th: ["ID", "Código", "Stock", "Precio", "Total", "Fecha", "Estado", "Depto"], status: ["Hecho", "Espera", "Revisión", "Proceso"], depts: ["I+D", "Ventas", "Calidad", "Logística"] },
        pt: { th: ["ID", "Código", "Estoque", "Preço", "Total", "Data", "Status", "Depto"], status: ["Feito", "Espera", "Revisão", "Processo"], depts: ["P&D", "Vendas", "Qualidade", "Logística"] },
        it: { th: ["ID", "Codice", "Stock", "Prezzo", "Totale", "Data", "Stato", "Rep"], status: ["Fatto", "Attesa", "Revisione", "In corso"], depts: ["R&S", "Vendite", "Qualità", "Logistica"] },
        ru: { th: ["ID", "Код", "Запас", "Цена", "Итог", "Дата", "Статус", "Отд"], status: ["Готово", "Ожидание", "Проверка", "В работе"], depts: ["НИОКР", "Продажи", "ОТК", "Логистика"] },
        hi: { th: ["ID", "कोड", "स्टॉक", "मूल्य", "कुल", "तिथि", "स्थिति", "विभाग"], status: ["पूर्ण", "लंबित", "समीक्षा", "जारी"], depts: ["विकास", "बिक्री", "गुणवत्ता", "रसद"] },
        ar: { th: ["رقم", "كود", "مخزون", "سعر", "إجمالي", "تاريخ", "حالة", "قسم"], status: ["تم", "انتظار", "مراجعة", "جاري"], depts: ["تطوير", "مبيعات", "جودة", "لوجستيات"] },
        id: { th: ["ID", "Kode", "Stok", "Harga", "Total", "Tanggal", "Status", "Dept"], status: ["Selesai", "Tunggu", "Tinjau", "Proses"], depts: ["R&D", "Sales", "Kualitas", "Logistik"] }
    };

    function switchDemoLang(rawLang) {
        // translations が存在するかチェック
        if (typeof translations === 'undefined') {
            console.error("translations.js not found.");
            return;
        }

        // 言語キーの正規化（en, fr, id 等を確実に取得）
        let lang = rawLang.toLowerCase();
        if (lang.startsWith('zh-cn')) lang = 'zh';
        if (lang.startsWith('zh-tw')) lang = 'tw';
        if (lang.length > 2 && !['zh', 'tw'].includes(lang)) lang = lang.substring(0, 2);

        // データの取得（存在しない場合は英語をフォールバック）
        const data = translations[lang] || translations['en'];

        // 1. 基本テキストの適用（data-i18n 属性があるものをすべて置換）
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (data[key]) {
                el.innerHTML = data[key];
            } else if (translations['en'][key]) {
                // 特定の言語でキーが欠けている場合は英語を表示
                el.innerHTML = translations['en'][key];
            }
        });

        // 2. テーブルの再生成
        const labels = demoLabels[lang] || demoLabels['en'];
        let headRow = "<tr>";
        labels.th.forEach(text => { headRow += `<th>${text}</th>`; });
        headRow += "</tr>";
        document.getElementById('table-head').innerHTML = headRow;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const price = (i === 5 || i === 14) ? 80000 : 12000 + (i * 1500);
            const qty = (i === 5 || i === 14) ? 2 : Math.floor(20 + Math.random() * 80);
            const total = price * qty;
            const row = `<tr>
                <td style="text-align:center">#${5000 + i}</td>
                <td class="num">KT-${100 + i}-X</td>
                <td class="num" ${qty < 10 ? 'style="color:#e74c3c; font-weight:bold;"' : ''}>${qty}</td>
                <td class="num">${price.toLocaleString()}</td>
                <td class="num">${total.toLocaleString()}</td>
                <td style="text-align:center">2026/03/${String(i).padStart(2, '0')}</td>
                <td class="status">${labels.status[i % 4]}</td>
                <td style="text-align:center">${labels.depts[i % 4]}</td>
            </tr>`;
            tbody.innerHTML += row;
        }

        // セレクトボックスの値を同期
        document.getElementById('lang-select').value = rawLang;
        localStorage.setItem('preferredLang', rawLang);
        document.documentElement.lang = lang;
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-content').innerText;
        if (!text) return;

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn-text');
            const originalText = btn.innerText;
            btn.innerText = "✓ Copied!";
            btn.style.background = "#2ecc71";
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.background = "#8cced7";
            }, 2000);
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('preferredLang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');
        switchDemoLang(savedLang);
    });
</script>
</body>
</html>
